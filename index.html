<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Sim-Drive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="css/main.css" />
</head>
<body>
<canvas id="c"></canvas>

<!-- Map picker -->
<div id="start">
  <div id="map"><div class="crosshair"></div></div>
  <div id="panel">
    <div class="sub">Pan/search to a place, then drive the real streets — the world streams in as you go. Data: OpenStreetMap.</div>
    <h1>Sim-Drive</h1>
    <input id="search" placeholder="Search a place (e.g. Chicago Loop, Eiffel Tower)…" />
    <button id="geoBtn">⌖ My location</button>
    <div class="rad-group" id="radGroup" style="display:none"><!-- radius picker retired: the world streams as you drive -->
      <div class="rad" data-r="0.3">0.3 mi</div>
      <div class="rad sel" data-r="0.5">0.5 mi</div>
      <div class="rad" data-r="0.75">0.75 mi</div>
      <div class="rad" data-r="1">1 mi</div>
    </div>
    <button id="go">Drive Here →</button>
  </div>
</div>

<!-- Loading -->
<div id="loading">
  <div class="spin" id="spin"></div>
  <div id="loadMsg">Loading…</div>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadSub"></div>
  <div id="loadErr"></div>
  <button id="backBtn">← Back to map</button>
</div>

<!-- top-right buttons + Controls popover -->
<div id="topbtns">
  <button id="camView">🎥 Camera</button>
  <button id="radioBtn">📻 Radio</button>
  <button id="nextBtn" style="display:none">⏭ Next</button>
  <button id="controls">⌨ Controls</button>
  <button id="newLoc">⌖ New location</button>
</div>
<div id="radioToast" class="hidden"></div>
<div id="help" class="hidden">
  <div class="help-title">Controls</div>
  <div class="help-row"><span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / arrows</span> <span>drive</span></div>
  <div class="help-row"><span><kbd>Space</kbd></span> <span>brake</span></div>
  <div class="help-row"><span><kbd>H</kbd></span> <span>horn</span></div>
  <div class="help-row"><span><kbd>C</kbd></span> <span>camera</span></div>
  <div class="help-row"><span><kbd>R</kbd></span> <span>radio station</span></div>
  <div class="help-row"><span><kbd>N</kbd></span> <span>next track (Spotify)</span></div>
  <div class="help-row" id="buildStamp"></div>
</div>
<div id="fps"></div>

<!-- Touch driving controls (shown only on coarse-pointer devices while driving) -->
<div id="touch">
  <div class="tc tc-left">
    <button id="tLeft" aria-label="steer left">◀</button>
    <button id="tRight" aria-label="steer right">▶</button>
  </div>
  <div class="tc tc-right">
    <button id="tGas" aria-label="accelerate">▲</button>
    <button id="tBrake" aria-label="brake / reverse">▼</button>
  </div>
</div>

<div id="dashboard">
  <div class="dash-cluster"><canvas id="speedHud" width="200" height="200"></canvas></div>
  <div class="dash-center">
    <div class="info-screen"><canvas id="mini" width="176" height="176"></canvas></div>
    <div id="nowPlaying" class="hidden"><span id="npText"></span></div>
  </div>
  <div class="dash-side">
    <div class="gear-readout" id="gear">P R N <b>D</b></div>
    <div class="vent"><i></i><i></i><i></i><i></i></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module" src="js/bootstrap.js?v=6"></script><!-- bump ?v whenever bootstrap.js changes (it's edge-cached) -->
</body>
</html>
